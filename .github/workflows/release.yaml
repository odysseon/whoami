name: Release

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "npm tag to publish under (e.g., dev, beta)"
        required: true
        default: "dev"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🔐 Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: ⚙️ Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      # Standard Release Flow (Auto) - Uses Trusted Publishing
      - name: 🚀 Create Release Pull Request or Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Dev/Snapshot Flow (Manual) - Uses Trusted Publishing
      - name: 🧪 Publish Dev Snapshot
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: pnpm release:dev --tag ${{ github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

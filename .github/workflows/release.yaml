name: Release

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches: [main, develop]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🔐 Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ⚙️ Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: 🆙 Upgrade npm
        run: |
          npm install -g npm@latest
          npm config set provenance true

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Packages
        run: pnpm build

      - name: 🔍 Verify OIDC Trust
        run: |
          echo "Verifying OIDC handshake for @odysseon scope..."
          npm access list packages odysseon
        env:
          NPM_CONFIG_PROVENANCE: true

      # =========================================================
      # ADDED: Failsafe to enforce branch publishing rules
      # =========================================================
      - name: 🛡️ Enforce Branch Publishing Rules
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Triggering branch is $HEAD_BRANCH"

          if [ "$HEAD_BRANCH" == "develop" ]; then
            if [ ! -f ".changeset/pre.json" ]; then
              echo "🚨 FATAL ERROR: On 'develop' but not in pre-release mode!"
              echo "Run 'pnpm changeset pre enter <tag>' locally and commit."
              exit 1
            fi
          elif [ "$HEAD_BRANCH" == "main" ]; then
            if [ -f ".changeset/pre.json" ]; then
              echo "🚨 FATAL ERROR: On 'main' but pre-release mode is active!"
              echo "Run 'pnpm changeset pre exit' before merging to main."
              exit 1
            fi
          fi

      - name: 🚀 Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          branch: ${{ github.event.workflow_run.head_branch }}
          version: pnpm exec changeset version
          publish: pnpm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: 🚨 Rescue npm Crash Logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-debug-logs
          path: /home/runner/.npm/_logs/*.log
